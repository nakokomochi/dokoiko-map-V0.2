<!DOCTYPE html>
<html lang="ja">

<head>
   <meta charset="UTF-8">
   <title>どこいこMap・地名版</title>
   <link rel="stylesheet" href="ChoiceYourRoad.css">
   <link rel="icon" href="dog.png">
</head>

<body>
   <div class="app">

      <div class="logo">
         <img src="dog.png" alt="どこいこMapロゴ" class="site-icon">
         <h1>どこいこMap・地名版</h1>
      </div>

      <div class="mode-switch">
         <button class="active" onclick="location.href='index.html'">地名表示</button>
         <button onclick="location.href='spot.html'">スポット表示</button>
      </div>

      <p class="site-description">
         ドライブ・ツーリングスポットをランダムに抽出し提案するサイトです。
         <br>
         出発地を入力し、片道の移動時間、高速道路の利用有無（※30分は高速なし）を選んでください。
         <br>
         オレンジ色の「どこいこうかな！」ボタンを押すと、ランダムで大まかな目的地をご提案します。
      </p>

      <section class="panel-top">

            <label>出発地の住所を入力してね：</label><br>
            <input id="startLocation" type="text" placeholder="例：東京都渋谷区">
            <br>

            <button onclick="getCurrentLocation()" class="location-btn">
               📍 現在地を使用する
            </button>

            <p class="notice">
               ※現在地は保存されません。地図表示のみに使用します。
            </p>

            <label>移動時間を選択:</label>

            <select id="timeSelect">
               <option value="30">30分</option>
               <option value="60">1時間</option>
               <option value="90">1時間30分</option>
               <option value="120">2時間</option>
               <option value="150">2時間30分</option>
               <option value="180">3時間</option>
            </select>

            <br>

            <label>高速道路の利用:</label>

            <select id="highway">
               <option value="yes">使う</option>
               <option value="no">使わない</option>
            </select>

            <br>

            <button class="main-button" onclick="searchSpot()">どこいこうかな！</button>

            <div class="results" id="resultsBox">
               <div id="result"></div>
            </div>

         

      </section>

      <section class="panel-map">
         <div id="map"></div>
      </section>

      <script src="ChoiceYourRoad.js"></script>

      <script
         src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAq5eQxHTd9QefSWoJUoLSDmN-pDLvLOLI&callback=initMap"
         async defer>
      </script>

   </div>
</body>

</html>
